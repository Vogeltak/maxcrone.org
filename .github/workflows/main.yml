name: Build and deploy maxcrone.org

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Publish website
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
      - name: Build and deploy
        uses: shalzz/zola-deploy-action@v0.22.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
